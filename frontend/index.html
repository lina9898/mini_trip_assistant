<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能旅行助手</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="page-shell">
        <section class="hero-bar hero-home">
            <div class="hero-copy">
                <span class="eyebrow">AI Trip Planner</span>
                <h1>智能旅行助手</h1>
                <p>
                    输入出发地、目的地、日期和偏好，系统会调用天气、交通、景点、预算等工具生成可继续修改和导出的旅行方案。
                </p>
            </div>
            <div class="hero-actions">
                <button id="history-button" class="button secondary">查看历史项目</button>
            </div>
        </section>

        <section class="card card-form">
            <div class="section-head">
                <div>
                    <h2>新建行程</h2>
                    <div class="muted">填写旅行需求后，系统将生成一份完整的行程快照。</div>
                </div>
            </div>

            <form id="trip-form" class="form-grid">
                <div class="field">
                    <label for="origin">出发地</label>
                    <input id="origin" value="北京" required>
                </div>
                <div class="field">
                    <label for="destination">目的地</label>
                    <input id="destination" value="上海" required>
                </div>
                <div class="field">
                    <label for="start_date">计划出行日期</label>
                    <input id="start_date" type="date" value="2026-05-01" required>
                </div>
                <div class="field">
                    <label for="days">旅行天数</label>
                    <input id="days" type="number" min="1" value="3" required>
                </div>
                <div class="field">
                    <label for="people">出行人数</label>
                    <input id="people" type="number" min="1" value="2" required>
                </div>
                <div class="field">
                    <label for="pace">旅行节奏</label>
                    <select id="pace">
                        <option>紧凑</option>
                        <option selected>适中</option>
                        <option>轻松</option>
                    </select>
                </div>
                <div class="field">
                    <label for="budget_level">预算档位</label>
                    <select id="budget_level">
                        <option>低</option>
                        <option selected>中</option>
                        <option>高</option>
                    </select>
                </div>
                <div class="field full">
                    <label for="preference">旅行偏好</label>
                    <textarea id="preference" required>城市风光、美食、拍照</textarea>
                </div>
                <div class="field full">
                    <div class="action-row">
                        <button id="generate-button" class="button" type="submit">生成行程</button>
                    </div>
                </div>
            </form>

            <div id="form-status" class="notice" hidden></div>
        </section>
    </div>

    <script src="/static/js/common.js"></script>
    <script src="/static/js/home.js"></script>
</body>
</html>
